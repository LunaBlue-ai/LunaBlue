<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaBlue - AI Orchestration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .moon-icon {
            font-size: 1.2em;
        }

        .header p {
            color: rgba(226, 232, 240, 0.8);
            font-size: 0.9em;
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid #4f46e5;
            color: #e2e8f0;
        }

        .status {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 0.85em;
            color: rgba(226, 232, 240, 0.7);
        }

        .status.ready {
            color: #86efac;
        }

        .status.loading {
            color: #fbbf24;
        }

        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.95em;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        button:active {
            background: #1d4ed8;
        }

        .model-selector {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
        }

        select {
            padding: 6px 10px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 4px;
            color: #e2e8f0;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .placeholder {
            text-align: center;
            padding: 40px 20px;
            color: rgba(226, 232, 240, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="moon-icon">🌙</span>
                LunaBlue
            </h1>
            <p>AI Orchestration Layer - Phase 1 Prototype</p>
        </div>

        <div class="model-selector">
            <label for="model-select">Active Model:</label>
            <select id="model-select">
                <option value="phi-3-mini">Phi-3 Mini (Default)</option>
            </select>
            <span id="status-indicator" class="status ready">✓ Ready</span>
        </div>

        <div class="chat-container" id="chat">
            <div class="placeholder">
                <p>Welcome to LunaBlue!</p>
                <p style="font-size: 0.85em; margin-top: 10px;color: rgba(226, 232, 240, 0.4);">
                    Chat will appear here. Type a message to get started.
                </p>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="prompt-input" 
                placeholder="Ask me anything..."
                autocomplete="off"
            />
            <button onclick="sendPrompt()">Send</button>
        </div>

        <div class="status" id="status">
            Connecting to LunaBlueAI...
        </div>
    </div>

    <script>
        const MAX_MESSAGES = 100;
        let messages = [];

        async function checkStatus() {
            try {
                const response = await fetch('http://localhost:3000/health');
                if (response.ok) {
                    document.getElementById('status').textContent = '✓ Connected to LunaBlueAI';
                    document.getElementById('status').classList.add('ready');
                    document.getElementById('status-indicator').textContent = '✓ Ready';
                    document.getElementById('status-indicator').className = 'status ready';
                    return true;
                }
            } catch (error) {
                console.log('Status check failed:', error);
            }
            return false;
        }

        async function sendPrompt() {
            const input = document.getElementById('prompt-input');
            const text = input.value.trim();

            if (!text) return;

            // Add user message
            addMessage(text, 'user');
            input.value = '';

            // Show loading
            const status = document.getElementById('status');
            status.textContent = '⏳ LunaBlueAI is thinking...';
            status.className = 'status loading';

            try {
                const response = await fetch('http://localhost:3000/api/prompt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });

                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.response, 'assistant');
                } else {
                    addMessage('Error: Unable to get response from LunaBlueAI', 'assistant');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('Error: Connection failed. Is LunaBlueAI running?', 'assistant');
            } finally {
                status.textContent = '✓ Ready';
                status.className = 'status ready';
            }
        }

        function addMessage(text, role) {
            const chat = document.getElementById('chat');

            // Remove placeholder if first message
            if (messages.length === 0) {
                chat.innerHTML = '';
            }

            const message = document.createElement('div');
            message.className = `message ${role}`;
            message.textContent = text;

            chat.appendChild(message);
            chat.scrollTop = chat.scrollHeight;

            messages.push({ text, role });

            // Limit message history
            if (messages.length > MAX_MESSAGES) {
                messages = messages.slice(-MAX_MESSAGES);
            }
        }

        // Handle Enter key
        document.getElementById('prompt-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrompt();
            }
        });

        // Check status on load
        window.addEventListener('load', checkStatus);
        setInterval(checkStatus, 5000); // Check every 5 seconds
    </script>
</body>
</html>
