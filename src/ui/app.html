<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LunaBlue AI - Multi-LLM Orchestration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
      gap: 0;
    }

    .sidebar {
      width: 300px;
      background: #1a1a2e;
      color: #fff;
      padding: 20px;
      border-right: 1px solid #2a2a4e;
      overflow-y: auto;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .header {
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #10b981;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-badge.error {
      background: #ef4444;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .message.ai .message-content {
      background: #f3f4f6;
      color: #1f2937;
      border: 1px solid #e5e7eb;
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .input-group {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    select {
      width: 100%;
      padding: 10px;
      background: #2a2a4e;
      color: #fff;
      border: 1px solid #3a3a5e;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    select:focus {
      outline: none;
      border-color: #667eea;
    }

    .model-info {
      background: #2a2a4e;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
      color: #d1d5db;
    }

    .model-info strong {
      color: #f3f4f6;
      display: block;
      margin-bottom: 4px;
    }

    .system-status {
      background: #2a2a4e;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 12px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #d1d5db;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .donoharm-badge {
      background: #fbbf24;
      color: #000;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="sidebar">
      <div class="sidebar-section">
        <h2>Model</h2>
        <select id="modelSelect" onchange="selectModel(this.value)">
          <option value="">Loading models...</option>
        </select>
        <div id="modelInfo" class="model-info" style="display: none;"></div>
      </div>

      <div class="sidebar-section">
        <h2>System Status</h2>
        <div id="systemStatus" class="system-status">
          <div class="loading-spinner" style="display: inline-block; margin-right: 8px;"></div>
          Connecting...
        </div>
      </div>

      <div class="sidebar-section">
        <div class="donoharm-badge" onclick="showDoNoHarmDetails()" style="cursor: pointer;">🛡️ DoNoHarm Enabled</div>
        <div id="doNoHarmDetails" style="display: none; margin-top: 12px; background: #2a2a4e; padding: 12px; border-radius: 6px; font-size: 11px;">
          <strong style="color: #fbbf24; display: block; margin-bottom: 8px;">Ethical Framework Active</strong>
          <div style="color: #d1d5db; max-height: 200px; overflow-y: auto;">
            <p id="doNoHarmStatus">Loading...</p>
          </div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="header">
        <h1>LunaBlue AI</h1>
        <div>
          <span class="status-badge" id="statusBadge">Initializing...</span>
        </div>
      </div>

      <div class="chat-container">
        <div class="messages" id="messages"></div>

        <div class="input-area">
          <div class="input-group">
            <input
              type="text"
              id="promptInput"
              placeholder="Enter your prompt here..."
              onkeypress="handleKeyPress(event)"
            />
            <button onclick="sendPrompt()">Send</button>
            <button onclick="clearChat()" style="background: #6b7280;">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentModel = null;
    let conversationHistory = [];

    // Initialize UI on page load
    window.addEventListener('load', async () => {
      await loadModels();
      await updateSystemStatus();
      setInterval(updateSystemStatus, 5000);
    });

    // Load available models
    async function loadModels() {
      try {
        const response = await fetch('/api/models');
        const models = await response.json();

        const select = document.getElementById('modelSelect');
        select.innerHTML = '';

        models.forEach(model => {
          const option = document.createElement('option');
          option.value = model.id;
          option.textContent = model.name;
          select.appendChild(option);
        });

        if (models.length > 0) {
          select.value = models[0].id;
          currentModel = models[0];
          selectModel(models[0].id);
        }
      } catch (error) {
        console.error('Failed to load models:', error);
      }
    }

    // Select a model
    async function selectModel(modelId) {
      const response = await fetch('/api/models');
      const models = await response.json();
      currentModel = models.find(m => m.id === modelId);

      if (currentModel) {
        const info = document.getElementById('modelInfo');
        info.innerHTML = `
          <strong>${currentModel.name}</strong>
          Context: ${currentModel.context_size}
          File: ${currentModel.file}
        `;
        info.style.display = 'block';
      }
    }

    // Update system status
    async function updateSystemStatus() {
      try {
        const response = await fetch('/api/models/status');
        const status = response.ok ? await response.json() : { error: 'Connection failed' };

        const statusHtml = `
          <div class="status-item">
            <span>Status:</span>
            <strong>${status.isRunning ? '🟢 Running' : '🔴 Offline'}</strong>
          </div>
          <div class="status-item">
            <span>Model:</span>
            <strong>${currentModel?.name || 'N/A'}</strong>
          </div>
          <div class="status-item">
            <span>Port:</span>
            <strong>${status.port || 8000}</strong>
          </div>
        `;

        document.getElementById('systemStatus').innerHTML = statusHtml;
        document.getElementById('statusBadge').textContent = status.isRunning ? '🟢 Ready' : '🔴 Offline';
        document.getElementById('statusBadge').className =
          status.isRunning ? 'status-badge' : 'status-badge error';
      } catch (error) {
        console.error('Failed to update status:', error);
      }
    }

    // Send prompt
    async function sendPrompt() {
      const input = document.getElementById('promptInput');
      const text = input.value.trim();

      if (!text) return;

      // Add user message to chat
      addMessage('user', text);
      input.value = '';
      conversationHistory.push({ role: 'user', content: text });

      try {
        // Send prompt to API
        const response = await fetch('/api/prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await response.json();
        if (data.error) {
          addMessage('ai', `Error: ${data.error}`);
        } else {
          addMessage('ai', data.response);
          conversationHistory.push({ role: 'assistant', content: data.response });
        }
      } catch (error) {
        addMessage('ai', `Error: ${error.message}`);
      }
    }

    // Add message to chat
    function addMessage(role, content) {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      messageEl.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Handle Enter key in input
    function handleKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendPrompt();
      }
    }

    // Clear chat history
    function clearChat() {
      document.getElementById('messages').innerHTML = '';
      conversationHistory = [];
    }

    // Show DoNoHarm details
    async function showDoNoHarmDetails() {
      const detailsDiv = document.getElementById('doNoHarmDetails');
      if (detailsDiv.style.display === 'none') {
        detailsDiv.style.display = 'block';
        await loadDoNoHarmStatus();
      } else {
        detailsDiv.style.display = 'none';
      }
    }

    // Load DoNoHarm status
    async function loadDoNoHarmStatus() {
      try {
        const response = await fetch('/api/donoharm/status');
        const status = await response.json();

        let html = `
          <p><strong>Status:</strong> ${status.enabled ? '✓ Active' : '✗ Inactive'}</p>
          <p><strong>Knowledge Base:</strong> ${status.loaded ? '✓ Loaded' : '✗ Not Loaded'}</p>
          <p><strong>Guidelines:</strong> ${status.guidelines.characters} characters</p>
          <p><strong>Values:</strong> ${status.values.characters} characters</p>
        `;

        document.getElementById('doNoHarmStatus').innerHTML = html;
      } catch (error) {
        console.error('Failed to load DoNoHarm status:', error);
        document.getElementById('doNoHarmStatus').innerHTML = `<p style="color: #ef4444;">Error loading status</p>`;
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
