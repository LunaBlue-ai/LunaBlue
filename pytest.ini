# Repo-root pytest configuration: `pytest` from here runs the consolidated
# backend suite (tests/backend). No GPU, model file, or manual setup needed;
# tests that want Postgres skip unless the docker-compose test service is up:
#   docker compose --profile test up -d postgres-test
[pytest]
testpaths = tests/backend
asyncio_mode = auto
# Resolve `app` from the source tree directly — the suite must not depend on
# an editable install being present (or unshadowed) in the environment.
pythonpath = backend
