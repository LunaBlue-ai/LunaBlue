# LunaBlue CI (Step 16): lint + backend suite against a Postgres service,
# and frontend type-check + build + tests. No GPU, model file, or
# llama-cpp-python anywhere — the suite runs on the fake runtime by design.
name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lunablue_test
          POSTGRES_PASSWORD: lunablue_test
          POSTGRES_DB: lunablue_test
        # Same host port the local docker-compose postgres-test service uses,
        # so the suite's default LUNABLUE_TEST_DATABASE_URL applies unchanged.
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U lunablue_test -d lunablue_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Postgres is provisioned above: database-backed tests must run, never
      # skip (a skip would silently shrink the suite).
      LUNABLUE_TEST_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend with dev extras (no llama-cpp-python)
        run: pip install -e "backend[dev]"
      - name: Lint
        run: ruff check backend/app tests/backend
      - name: Backend test suite
        run: pytest

  frontend:
    name: Frontend (tsc + build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build
      - name: Frontend test suite
        run: npm test
