# LunaBlue CI (Step 16): lint + backend suite, and frontend type-check +
# build + tests. No GPU, model file, llama-cpp-python, or database service
# anywhere — the suite runs on the fake runtime, and database tests use a
# temp-file SQLite database automatically (Step 21).
name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend with dev extras (no llama-cpp-python)
        run: pip install -e "backend[dev]"
      - name: Lint
        run: ruff check backend/app tests/backend
      - name: Backend test suite
        # Database tests run against a temp SQLite file with no skip path;
        # -W-style skip auditing is unnecessary, but keep the summary loud.
        run: pytest -ra

  frontend:
    name: Frontend (tsc + build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build
      - name: Frontend test suite
        run: npm test
